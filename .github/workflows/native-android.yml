name: Native Android bridge

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "native/android/**"
      - ".github/workflows/native-android.yml"
  pull_request:
    paths:
      - "native/android/**"
      - ".github/workflows/native-android.yml"
  workflow_dispatch:

jobs:
  build-aar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build .aar
        working-directory: native/android
        run: ./gradlew :nearby-bridge:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: nearby-bridge-aar
          path: native/android/nearby-bridge/build/outputs/aar/*.aar
