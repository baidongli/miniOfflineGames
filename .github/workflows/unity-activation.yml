name: Acquire Unity activation file

# Run this once to generate a Unity .alf activation file.
# Then upload the .alf at https://license.unity3d.com/manual to get a .ulf,
# and paste the .ulf contents into the UNITY_LICENSE repository secret.

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request activation file
    runs-on: ubuntu-latest
    steps:
      - uses: game-ci/unity-request-activation-file@v2
        id: getManualLicenseFile
        with:
          unityVersion: 2022.3.40f1
      - uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
