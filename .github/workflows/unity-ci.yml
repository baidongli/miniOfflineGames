name: Unity CI

# Builds and tests the Unity project on every push and PR.
# Requires the following repository secrets (Settings → Secrets and variables → Actions):
#   UNITY_LICENSE   - contents of your .ulf license file (see activation workflow)
#   UNITY_EMAIL     - Unity account email
#   UNITY_PASSWORD  - Unity account password
#
# To get UNITY_LICENSE the first time, run the "Acquire activation file" workflow,
# upload the generated .alf at https://license.unity3d.com/manual, download the .ulf,
# and paste its contents into the UNITY_LICENSE secret.

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "unity/**"
      - ".github/workflows/unity-ci.yml"
  pull_request:
    paths:
      - "unity/**"
      - ".github/workflows/unity-ci.yml"
  workflow_dispatch:

env:
  UNITY_VERSION: 2022.3.40f1
  PROJECT_PATH: unity

jobs:
  test:
    name: Test ${{ matrix.testMode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode: [editmode, playmode]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-test-${{ matrix.testMode }}-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-test-${{ matrix.testMode }}-
            Library-

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} test results

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-android-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-android-
            Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          androidExportType: androidPackage
          allowDirtyBuild: true

      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/Android
          if-no-files-found: warn

  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-ios-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-ios-
            Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: iOS
          allowDirtyBuild: true

      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: build/iOS
          if-no-files-found: warn
